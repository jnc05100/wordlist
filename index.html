<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>끝말잇기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Pretendard:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161c;
    --panel:#1b1e27;
    --panel-line:#2a2e3a;
    --ink:#e9e7e0;
    --muted:#8b8f9c;
    --amber:#e3a04f;
    --amber-dim:#7a5a2c;
    --teal:#5fa8a0;
    --rose:#c9667a;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(227,160,79,0.07), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Pretendard', -apple-system, sans-serif;
    line-height:1.6;
    font-size:16px;
  }

  .layout{
    display:grid;
    grid-template-columns:minmax(0,720px) 220px;
    gap:56px;
    max-width:1000px;
    margin:0 auto;
    padding:64px 24px 120px;
    align-items:start;
  }

  /* ---------- 헤더 ---------- */
  header{
    margin-bottom:36px;
    padding-bottom:28px;
    border-bottom:1px solid var(--panel-line);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--teal);
    letter-spacing:.1em;
  }
  h1{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:34px;
    margin:10px 0 12px;
    color:#fff;
  }
  .meta{
    color:var(--muted);
    font-size:13.5px;
  }
  .meta strong{color:var(--amber);}

  .category-tabs{
    position:sticky;
    top:0;
    z-index:30;
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:1px;
    background:var(--panel-line);
    border-bottom:1px solid var(--panel-line);
  }
  .category-tabs .tab{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:var(--bg);
    border:none;
    color:var(--ink);
    border-radius:0;
    padding:16px 14px;
    font-family:'Noto Serif KR', serif;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  .category-tabs .tab .tab-n{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
    background:rgba(255,255,255,.06);
    border-radius:4px;
    padding:1px 7px;
  }
  .category-tabs .tab:hover{background:#1b1e27; color:#fff;}
  .category-tabs .tab.active{
    background:rgba(227,160,79,.12);
    color:#fff;
    box-shadow:inset 0 -3px 0 var(--amber);
  }
  .category-tabs .tab.active .tab-n{color:var(--amber);}
  .category-tabs .tab[data-cat="한방단어"].active{background:rgba(227,160,79,.14); box-shadow:inset 0 -3px 0 var(--amber);}
  .category-tabs .tab[data-cat="빌드"].active{background:rgba(95,168,160,.14); box-shadow:inset 0 -3px 0 var(--teal);}
  .category-tabs .tab[data-cat="방어"].active{background:rgba(201,102,122,.14); box-shadow:inset 0 -3px 0 var(--rose);}
  .category-tabs .tab[data-cat="일반단어"].active{background:rgba(139,143,156,.14); box-shadow:inset 0 -3px 0 var(--muted);}

  .cat-dot{
    display:inline-block;
    flex:0 0 auto;
    width:7px; height:7px;
    border-radius:50%;
  }
  .cat-dot.big{width:10px; height:10px;}
  .cat-dot[data-cat="한방단어"]{background:var(--amber);}
  .cat-dot[data-cat="빌드"]{background:var(--teal);}
  .cat-dot[data-cat="방어"]{background:var(--rose);}
  .cat-dot[data-cat="일반단어"]{background:var(--muted);}
  .word.cat-hidden{display:none;}

  /* ---------- 단어 그룹 ---------- */
  .group{margin-bottom:14px; scroll-margin-top:24px;}

  .group-toggle{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:8px;
    padding:13px 16px;
    cursor:pointer;
    font-family:'Pretendard', sans-serif;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  .group-toggle:hover{border-color:var(--amber-dim);}
  .group-toggle .left{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .group-toggle .cho{
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    color:var(--amber);
    border:1px solid var(--amber-dim);
    border-radius:5px;
    padding:2px 9px;
    background:rgba(227,160,79,.06);
  }
  .group-toggle .label{
    font-family:'Noto Serif KR', serif;
    font-size:17px;
    color:#fff;
  }
  .group-toggle .count{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
  }
  .group-toggle .chevron{
    width:16px; height:16px;
    color:var(--muted);
    flex:0 0 auto;
    transition:transform .2s;
  }
  .group.open .group-toggle .chevron{transform:rotate(180deg); color:var(--amber);}

  .word-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:8px;
    margin-top:0;
    overflow:hidden;
    max-height:0;
    opacity:0;
    padding:0 1px;
    transition:max-height .3s ease, opacity .2s ease, margin-top .3s ease;
  }
  .group.open .word-grid{
    max-height:4000px;
    opacity:1;
    margin-top:10px;
  }

  .chain-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:0;
    overflow:hidden;
    max-height:0;
    opacity:0;
    transition:max-height .3s ease, opacity .2s ease, margin-top .3s ease;
  }
  .group.open .chain-list{
    max-height:4000px;
    opacity:1;
    margin-top:10px;
  }
  .chain-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
  }
  .chain-row .word.chain-word{width:auto;}
  .chain-arrow{
    color:var(--teal);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
  }
  .chain-empty{
    color:var(--muted);
    font-size:13.5px;
    line-height:1.7;
    background:#14161c;
    border:1px dashed var(--panel-line);
    border-radius:8px;
    padding:16px 18px;
  }
  .chain-example{
    color:var(--teal);
    font-family:'JetBrains Mono', monospace;
  }

  .word{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:7px;
    padding:9px 8px 9px 14px;
    font-size:14.5px;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  .word:hover{border-color:var(--amber-dim);}
  .word.hidden{display:none;}

  .word .text{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .word mark{
    background:linear-gradient(180deg, transparent 55%, rgba(227,160,79,.4) 55%);
    color:#fff;
    border-radius:0;
  }

  .copy-btn{
    flex:0 0 auto;
    width:26px;
    height:26px;
    border-radius:6px;
    border:1px solid var(--panel-line);
    background:#14161c;
    color:var(--muted);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    transition:border-color .15s, color .15s, background .15s;
  }
  .copy-btn:hover{border-color:var(--amber); color:var(--amber);}
  .copy-btn svg{width:14px; height:14px;}
  .copy-btn.copied{
    border-color:var(--teal);
    background:rgba(95,168,160,.12);
    color:var(--teal);
  }

  .empty-msg{
    color:var(--muted);
    font-size:14px;
    padding:24px 0;
    display:none;
  }
  .empty-msg.show{display:block;}

  /* ---------- 오른쪽 목차(데스크톱) ---------- */
  .toc{
    position:sticky;
    top:24px;
    max-height:calc(100vh - 48px);
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .toc-search{
    position:relative;
  }
  .toc-search input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:7px;
    padding:9px 12px 9px 32px;
    color:var(--ink);
    font-family:'Pretendard', sans-serif;
    font-size:13.5px;
    outline:none;
  }
  .toc-search input::placeholder{color:var(--muted);}
  .toc-search input:focus{border-color:var(--amber);}
  .toc-search svg{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    width:14px;
    height:14px;
    color:var(--muted);
    pointer-events:none;
  }
  .toc-count{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
  }
  .toc-count strong{color:var(--amber);}

  .toc-nav{
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:2px;
    border-top:1px solid var(--panel-line);
    padding-top:12px;
  }
  .toc-nav a{
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--muted);
    text-decoration:none;
    font-size:13.5px;
    padding:6px 0 6px 12px;
    border-left:1px solid var(--panel-line);
    transition:color .15s, border-color .15s;
  }
  .toc-nav a .cho{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--amber-dim);
    width:16px;
  }
  .toc-nav a .n{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
  }
  .toc-nav a:hover, .toc-nav a:focus-visible, .toc-nav a.active{
    color:var(--ink);
    border-left-color:var(--amber);
  }
  .toc-nav a.active .cho{color:var(--amber);}

  /* ---------- 모바일 메뉴 ---------- */
  .mobile-bar{display:none;}
  .mobile-overlay{display:none;}

  @media (max-width:760px){
    .layout{
      grid-template-columns:1fr;
      padding:132px 20px 80px;
    }
    .toc{display:none;}

    .category-tabs{
      margin-top:56px;
      top:56px;
    }

    .mobile-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      position:fixed;
      top:0; left:0; right:0;
      z-index:40;
      background:rgba(20,22,28,.9);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--panel-line);
      padding:14px 20px;
    }
    .mobile-bar .title{
      font-family:'JetBrains Mono', monospace;
      font-size:12px;
      color:var(--amber);
      letter-spacing:.06em;
    }
    .menu-btn{
      width:36px; height:36px;
      border-radius:8px;
      border:1px solid var(--panel-line);
      background:var(--panel);
      color:var(--ink);
      display:flex; align-items:center; justify-content:center;
    }
    .menu-btn svg{width:18px; height:18px;}

    .mobile-overlay{
      display:block;
      position:fixed;
      inset:0;
      background:rgba(10,11,14,.7);
      z-index:50;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s;
    }
    .mobile-overlay.open{opacity:1; pointer-events:auto;}

    .mobile-panel{
      position:fixed;
      top:0; right:0; bottom:0;
      width:min(300px, 82vw);
      background:var(--panel);
      border-left:1px solid var(--panel-line);
      transform:translateX(100%);
      transition:transform .25s ease;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:16px;
      overflow-y:auto;
    }
    .mobile-overlay.open .mobile-panel{transform:translateX(0);}

    .mobile-panel-header{
      display:flex; align-items:center; justify-content:space-between;
    }
    .mobile-panel-header span{
      font-family:'JetBrains Mono', monospace;
      font-size:12px; color:var(--muted); letter-spacing:.08em;
    }
    .close-btn{
      width:30px; height:30px;
      border-radius:7px;
      border:1px solid var(--panel-line);
      background:#14161c;
      color:var(--muted);
      display:flex; align-items:center; justify-content:center;
    }
    .close-btn svg{width:15px; height:15px;}
  }

  footer{
    color:var(--muted);
    font-size:12.5px;
    border-top:1px solid var(--panel-line);
    padding-top:20px;
    margin-top:20px;
    font-family:'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<nav class="category-tabs" id="categoryTabs">
  <button class="tab" data-cat="한방단어">한방단어 <span class="tab-n" id="cnt-한방단어">0</span></button>
  <button class="tab" data-cat="빌드">빌드 <span class="tab-n" id="cnt-빌드">0</span></button>
  <button class="tab" data-cat="방어">방어 <span class="tab-n" id="cnt-방어">0</span></button>
  <button class="tab" data-cat="일반단어">일반단어 <span class="tab-n" id="cnt-일반단어">0</span></button>
</nav>

<div class="mobile-bar">
  <span class="title">끝말잇기</span>
  <button class="menu-btn" id="menuOpen" aria-label="메뉴 열기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
  </button>
</div>

<div class="mobile-overlay" id="mobileOverlay">
  <div class="mobile-panel">
    <div class="mobile-panel-header">
      <span>목차 · 검색</span>
      <button class="close-btn" id="menuClose" aria-label="메뉴 닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="5" x2="19" y2="19"/><line x1="5" y1="19" x2="19" y2="5"/></svg>
      </button>
    </div>
    <div class="toc-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInputMobile" placeholder="첫 글자로 검색...">
    </div>
    <div class="toc-count"><strong id="countMobile">0</strong>개 표시 중</div>
    <nav class="toc-nav" id="tocNavMobile"></nav>
  </div>
</div>

<div class="layout">
  <main>
    <header>
      <h1>끝말잇기</h1>
      <div class="meta">총 <strong id="totalCount">0</strong>개 단어</div>
    </header>

    <div id="wordContainer"></div>
    <div class="empty-msg" id="emptyMsg">검색 결과가 없어요.</div>
  </main>

  <aside class="toc">
    <div class="toc-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInputDesktop" placeholder="첫 글자로 검색...">
    </div>
    <div class="toc-count"><strong id="countDesktop">0</strong>개 표시 중</div>
    <nav class="toc-nav" id="tocNavDesktop"></nav>
  </aside>
</div>

<script>

const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function getCho(ch){
  const code = ch.charCodeAt(0) - 0xAC00;
  if(code < 0 || code > 11171) return "#";
  return CHO[Math.floor(code / (21*28))];
}

// ---------- 자동 카테고리 분류 ----------
// 규칙: 이 단어장 안에서 "다음 글자를 이어받는 단어가 있는가"를 기준으로 판단
// 1) 한방단어 : 끝글자로 시작하는 단어가 이 목록에 하나도 없음 (상대가 이어받기 불가능)
// 2) 방어     : 이 단어의 첫글자가, 다른 한방단어의 끝글자와 같음 (한방단어를 받아칠 수 있는 단어)
// 3) 일반단어 : 그 외 나머지
// * 빌드는 단어 하나의 속성이 아니라 "한방단어로 몰아가는 연결 경로(체인)"라서 자동분류 대상이 아님.
//   예: 가위 → 위력 → 역량껏  (buildPaths 배열에 직접 등록)
const startCount = {};
words.forEach(w=>{
  const first = w[0];
  startCount[first] = (startCount[first] || 0) + 1;
});

const wordCategory = {};
words.forEach(w=>{
  const last = w[w.length-1];
  const followers = startCount[last] || 0;
  wordCategory[w] = followers === 0 ? '한방단어' : '일반단어';
});

const oneHitEnders = new Set(
  words.filter(w=>wordCategory[w] === '한방단어').map(w=>w[w.length-1])
);
words.forEach(w=>{
  if(wordCategory[w] !== '한방단어' && oneHitEnders.has(w[0])){
    wordCategory[w] = '방어';
  }
});

// 수동으로 방어로 지정한 단어 (자동분류 결과와 무관하게 고정)
const manualDefense = ['늡늡', '늣왜', '쁘라띠그라'];
manualDefense.forEach(w=>{
  if(wordCategory[w] !== undefined) wordCategory[w] = '방어';
});

// 빌드 경로 (직접 등록하는 연결 체인). 아직 등록된 경로가 없음.
const buildPaths = [];

// 초성별 그룹핑 (같은 초성은 하나의 그룹으로 병합) - 카테고리 태그는 각 단어에 유지되어 탭 필터링에 쓰임
const groupMap = new Map();
words.forEach(w=>{
  const cho = getCho(w[0]);
  if(!groupMap.has(cho)) groupMap.set(cho, []);
  groupMap.get(cho).push(w);
});
const choGroups = Array.from(groupMap, ([cho, items])=>({cho, type:'words', items}));
const groups = [
  { cho:'빌드', type:'chains', items: buildPaths },
  ...choGroups
];

document.getElementById('totalCount').textContent = words.length;

const container = document.getElementById('wordContainer');
const tocNavDesktop = document.getElementById('tocNavDesktop');
const tocNavMobile = document.getElementById('tocNavMobile');

const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const checkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;

groups.forEach((g, gi)=>{
  const groupId = 'group-' + gi;

  const section = document.createElement('div');
  section.className = 'group';
  section.dataset.cat = g.type === 'chains' ? '빌드' : '';
  section.id = groupId;

  const h2 = document.createElement('button');
  h2.className = 'group-toggle';
  h2.setAttribute('aria-expanded', 'true');
  const badge = g.type === 'chains'
    ? `<span class="cat-dot big" data-cat="빌드"></span><span class="label">빌드</span>`
    : `<span class="cho">${g.cho}</span><span class="label">${g.cho} 계열</span>`;
  h2.innerHTML = `
    <span class="left">
      ${badge}
      <span class="count">${g.items.length}개</span>
    </span>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  `;
  section.appendChild(h2);

  const grid = document.createElement('div');
  grid.className = g.type === 'chains' ? 'chain-list' : 'word-grid';

  h2.addEventListener('click', ()=>{
    section.classList.toggle('open');
    h2.setAttribute('aria-expanded', String(section.classList.contains('open')));
  });
  section.classList.add('open');

  if(g.type === 'chains'){
    if(g.items.length === 0){
      const empty = document.createElement('div');
      empty.className = 'chain-empty';
      empty.innerHTML = `아직 등록된 빌드 경로가 없어요.<br>예: <span class="chain-example">가위 → 위력 → 역량껏</span> 처럼 한방단어로 몰아가는 연결 단어들을 알려주시면 여기에 추가해드릴게요.`;
      grid.appendChild(empty);
    } else {
      g.items.forEach(chain=>{
        const row = document.createElement('div');
        row.className = 'chain-row';
        chain.forEach((word, wi)=>{
          if(wi > 0){
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '→';
            row.appendChild(arrow);
          }
          const item = document.createElement('div');
          item.className = 'word chain-word';
          item.dataset.word = word;
          item.dataset.category = '빌드';
          const text = document.createElement('span');
          text.className = 'text';
          text.textContent = word;
          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.innerHTML = copyIcon;
          btn.setAttribute('aria-label', word + ' 복사');
          btn.addEventListener('click', ()=>{
            navigator.clipboard.writeText(word).then(()=>{
              btn.innerHTML = checkIcon;
              btn.classList.add('copied');
              setTimeout(()=>{ btn.innerHTML = copyIcon; btn.classList.remove('copied'); }, 1400);
            });
          });
          item.appendChild(text);
          item.appendChild(btn);
          row.appendChild(item);
        });
        grid.appendChild(row);
      });
    }
  } else {
    g.items.forEach(word=>{
      const item = document.createElement('div');
      item.className = 'word';
      item.dataset.word = word;
      item.dataset.category = wordCategory[word];

      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = word;

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.innerHTML = copyIcon;
      btn.setAttribute('aria-label', word + ' 복사');
      btn.addEventListener('click', ()=>{
        navigator.clipboard.writeText(word).then(()=>{
          btn.innerHTML = checkIcon;
          btn.classList.add('copied');
          setTimeout(()=>{
            btn.innerHTML = copyIcon;
            btn.classList.remove('copied');
          }, 1400);
        });
      });

      item.appendChild(text);
      item.appendChild(btn);
      grid.appendChild(item);
    });
  }

  section.appendChild(grid);
  container.appendChild(section);

  // TOC 링크 (데스크톱 + 모바일)
  const tocLabel = g.type === 'chains'
    ? `<span class="cat-dot" data-cat="빌드"></span>빌드`
    : `<span class="cho">${g.cho}</span>${g.cho} 계열`;
  [tocNavDesktop, tocNavMobile].forEach(nav=>{
    const a = document.createElement('a');
    a.href = '#' + groupId;
    a.innerHTML = `${tocLabel} <span class="n">${g.items.length}</span>`;
    a.dataset.group = groupId;
    a.addEventListener('click', ()=>{
      section.classList.add('open');
      h2.setAttribute('aria-expanded', 'true');
    });
    nav.appendChild(a);
  });
});

// ---------- 검색 + 카테고리 필터 ----------
const allWordEls = Array.from(document.querySelectorAll('.word'));
const emptyMsg = document.getElementById('emptyMsg');
let currentCategory = 'all';

// 탭 카운트 채우기
const catCounts = {'한방단어':0, '빌드':buildPaths.length, '방어':0, '일반단어':0};
words.forEach(w=>{ catCounts[wordCategory[w]]++; });
Object.keys(catCounts).forEach(k=>{
  const el = document.getElementById('cnt-' + k);
  if(el) el.textContent = catCounts[k];
});

function highlight(el, query){
  const word = el.dataset.word;
  const textEl = el.querySelector('.text');
  if(!query || !word.startsWith(query)){ textEl.textContent = word; return; }
  textEl.innerHTML = '<mark>' + word.slice(0, query.length) + '</mark>' + word.slice(query.length);
}

function runSearch(query){
  query = query.trim();
  let visibleCount = 0;
  allWordEls.forEach(el=>{
    const searchMatch = !query || el.dataset.word.startsWith(query);
    const catMatch = currentCategory === 'all' || el.dataset.category === currentCategory;
    const match = searchMatch && catMatch;
    el.classList.toggle('hidden', !match);
    if(match){ visibleCount++; highlight(el, query); }
  });

  document.querySelectorAll('.group').forEach(g=>{
    const visibleWordCount = g.querySelectorAll('.word:not(.hidden)').length;
    const isEmptyChainGroup = g.dataset.cat === '빌드' && g.querySelectorAll('.word').length === 0;
    const categoryShown = currentCategory === 'all' || currentCategory === g.dataset.cat;
    const anyVisible = visibleWordCount > 0;
    const shouldShow = isEmptyChainGroup ? (categoryShown && !query) : anyVisible;
    g.style.display = shouldShow ? '' : 'none';
    if((query || currentCategory !== 'all') && shouldShow){
      g.classList.add('open');
      g.querySelector('.group-toggle').setAttribute('aria-expanded', 'true');
    }

    // 헤더/목차 카운트를 실제 보이는 단어 수로 갱신
    const countEl = g.querySelector('.group-toggle .count');
    if(countEl) countEl.textContent = visibleWordCount + '개';
    document.querySelectorAll('.toc-nav a[data-group="' + g.id + '"] .n').forEach(n=>{
      n.textContent = visibleWordCount;
    });
  });

  const buildEmptyShown = currentCategory === '빌드' && buildPaths.length === 0 && !query;
  emptyMsg.classList.toggle('show', visibleCount === 0 && !buildEmptyShown);
  document.getElementById('countDesktop').textContent = visibleCount;
  document.getElementById('countMobile').textContent = visibleCount;
}

document.querySelectorAll('.category-tabs .tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    const isAlreadyActive = tab.classList.contains('active');
    document.querySelectorAll('.category-tabs .tab').forEach(t=>t.classList.remove('active'));
    if(isAlreadyActive){
      currentCategory = 'all';
    } else {
      currentCategory = tab.dataset.cat;
      tab.classList.add('active');
    }
    runSearch(searchDesktopValue());
  });
});
function searchDesktopValue(){
  return document.getElementById('searchInputDesktop').value;
}

const searchDesktop = document.getElementById('searchInputDesktop');
const searchMobile = document.getElementById('searchInputMobile');
searchDesktop.addEventListener('input', e=>{ runSearch(e.target.value); searchMobile.value = e.target.value; });
searchMobile.addEventListener('input', e=>{ runSearch(e.target.value); searchDesktop.value = e.target.value; });

runSearch('');

// ---------- 목차 스크롤 활성화 표시 ----------
const groupEls = Array.from(document.querySelectorAll('.group'));
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      document.querySelectorAll('.toc-nav a').forEach(a=>{
        a.classList.toggle('active', a.dataset.group === entry.target.id);
      });
    }
  });
}, { rootMargin: '-10% 0px -70% 0px' });
groupEls.forEach(g=>observer.observe(g));

// ---------- 모바일 메뉴 ----------
const overlay = document.getElementById('mobileOverlay');
document.getElementById('menuOpen').addEventListener('click', ()=> overlay.classList.add('open'));
document.getElementById('menuClose').addEventListener('click', ()=> overlay.classList.remove('open'));
overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.classList.remove('open'); });
document.querySelectorAll('#tocNavMobile a').forEach(a=>{
  a.addEventListener('click', ()=> overlay.classList.remove('open'));
});
</script>
